name: manual fix hangtra layout 20260707

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/codex-manual-fix-hangtra-layout-20260707.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch HANG TRA final layout override
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          p = Path('index.html')
          s = p.read_text(encoding='utf-8')
          orig = s

          # Make the panel-resizer JS assign stable classes to the three panels.
          needle = "if(panels.length<3)return;"
          repl = "if(panels.length<3)return;panels[0].classList.add('retSystemPanel');panels[1].classList.add('retShopPanel');panels[2].classList.add('retStatsPanel');"
          if needle in s and repl not in s:
              s = s.replace(needle, repl, 1)

          # Ensure render creates panel resizers before table rendering.
          s = s.replace('function renderReturnTables(){renderReturnSystem();renderReturnShop();renderReturnSummary();enableReturnTableResize()}', 'function renderReturnTables(){setupReturnPanelResizers();renderReturnSystem();renderReturnShop();renderReturnSummary();enableReturnTableResize()}')

          # Use a v2 localStorage key so the broken 500/660 panel sizes from prior patch do not keep applying.
          s = s.replace("KKLG_RET_SYSTEM_W", "KKLG_RET_SYSTEM_W_V2")
          s = s.replace("KKLG_RET_STATS_W", "KKLG_RET_STATS_W_V2")
          s = s.replace("readPx('--ret-system-w',500)", "readPx('--ret-system-w',420)")
          s = s.replace("readPx('--ret-stats-w',660)", "readPx('--ret-stats-w',760)")
          s = s.replace("Math.max(420,Math.min(680,sw))", "Math.max(340,Math.min(620,sw))")
          s = s.replace("Math.max(540,Math.min(820,tw))", "Math.max(620,Math.min(900,tw))")
          s = s.replace("Math.max(420,Math.min(680,startSystem+dx))", "Math.max(340,Math.min(620,startSystem+dx))")
          s = s.replace("Math.max(540,Math.min(820,startStats-dx))", "Math.max(620,Math.min(900,startStats-dx))")

          # Remove prior final override, then append a stronger final CSS block after old patches.
          begin = '/* HANG TRA FINAL LAYOUT FIX 2026-07-07 BEGIN */'
          end = '/* HANG TRA FINAL LAYOUT FIX 2026-07-07 END */'
          s = re.sub(r'\n\s*/\* HANG TRA FINAL LAYOUT FIX 2026-07-07 BEGIN \*/.*?/\* HANG TRA FINAL LAYOUT FIX 2026-07-07 END \*/\n?', '\n', s, flags=re.S)
          css = [
              '',
              begin,
              '#hangtraPage .returnGrid{display:grid!important;grid-template-columns:var(--ret-system-w,420px) 6px minmax(620px,1fr) 6px var(--ret-stats-w,760px)!important;gap:4px!important;padding:6px!important;background:#fff!important;align-items:stretch!important}',
              '#hangtraPage .returnGrid>.returnPanel{min-width:0!important;width:auto!important;max-width:none!important}',
              '#hangtraPage .returnGrid>.retSystemPanel{grid-column:1!important;grid-row:1!important}',
              '#hangtraPage .returnGrid>.retGridResizerLeft{grid-column:2!important;grid-row:1!important}',
              '#hangtraPage .returnGrid>.retShopPanel{grid-column:3!important;grid-row:1!important}',
              '#hangtraPage .returnGrid>.retGridResizerRight{grid-column:4!important;grid-row:1!important}',
              '#hangtraPage .returnGrid>.retStatsPanel{grid-column:5!important;grid-row:1!important}',
              '#hangtraPage .retGridResizer{display:block!important;width:6px!important;min-width:6px!important;min-height:520px!important;cursor:col-resize!important;background:#cbd5e1!important;border-left:1px solid #b8c2cf!important;border-right:1px solid #f8fafc!important;border-radius:4px!important}',
              '#hangtraPage .retGridResizer:hover,#hangtraPage .retGridResizer.active{background:#0b5fa5!important}',
              '#hangtraPage .returnStatLine{white-space:nowrap!important;overflow:visible!important;text-overflow:clip!important;line-height:1.28!important}',
              '#hangtraPage .returnStatLine button{margin-left:4px!important}',
              '#hangtraPage .returnSystemTable,#hangtraPage .returnShopTable{table-layout:fixed!important;width:max-content!important;min-width:100%!important}',
              '#hangtraPage .returnTableBox{overflow:auto!important}',
              '@media (max-width:1500px){#hangtraPage .returnGrid{grid-template-columns:minmax(340px,var(--ret-system-w,380px)) 6px minmax(540px,1fr) 6px minmax(620px,var(--ret-stats-w,680px))!important}}',
              '@media (max-width:760px){#hangtraPage .retGridResizer{display:none!important}#hangtraPage .returnGrid{grid-template-columns:1fr!important;gap:5px!important}#hangtraPage .returnGrid>.returnPanel{grid-column:auto!important;grid-row:auto!important}}',
              end,
              ''
          ]
          block = '\n'.join(css)
          if '</style>' not in s:
              raise SystemExit('style close marker not found')
          s = s.replace('</style>', block + '</style>', 1)

          required = [
              'retSystemPanel',
              'retStatsPanel',
              begin,
              'grid-template-columns:var(--ret-system-w,420px) 6px minmax(620px,1fr) 6px var(--ret-stats-w,760px)',
              'KKLG_RET_SYSTEM_W_V2',
              'KKLG_RET_STATS_W_V2'
          ]
          missing = [x for x in required if x not in s]
          if missing:
              raise SystemExit('Missing markers: ' + ', '.join(missing))

          if s == orig:
              print('No changes; final layout already patched')
          else:
              p.write_text(s, encoding='utf-8')
              print('Patched final HANG TRA resizable layout override')
          PY
      - name: Commit and push
        shell: bash
        run: |
          if git diff --quiet -- index.html; then
            echo "No index.html changes"
            exit 0
          fi
          git config user.name "codex-bot"
          git config user.email "codex-bot@users.noreply.github.com"
          git add index.html
          git commit -m "fix hang tra resizable panel widths"
          git push
