name: manual fix hangtra layout 20260707

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch HANG TRA layout
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          p = Path('index.html')
          s = p.read_text(encoding='utf-8')
          orig = s

          s = s.replace('.returnGrid{display:grid;grid-template-columns:minmax(540px,.9fr) minmax(760px,1.35fr) minmax(500px,.95fr);gap:8px;padding:8px;background:#fff}', '.returnGrid{display:grid;grid-template-columns:var(--ret-system-w,500px) 7px minmax(720px,1fr) 7px var(--ret-stats-w,660px);gap:0;padding:8px;background:#fff}')
          s = re.sub(r"\n\s*#hangtraPage \.returnGrid\{grid-template-columns:minmax\(540px,\.9fr\) minmax\(760px,1\.35fr\) minmax\(500px,\.95fr\)!important;align-items:stretch\}", "", s)
          s = re.sub(r"\n\s*#hangtraPage \.returnGrid\{grid-template-columns:minmax\(540px,\.9fr\) minmax\(760px,1\.35fr\) minmax\(500px,\.95fr\)!important\}", "", s)
          s = re.sub(r"\n\s*#hangtraPage \.returnSystemTable th:nth-child\(2\).*?#hangtraPage \.returnNoteInput\{min-width:0!important\}", "\n    #hangtraPage .returnNoteInput{min-width:0!important}", s, flags=re.S)

          panel_css = """    #hangtraPage .returnGrid{grid-template-columns:var(--ret-system-w,500px) 7px minmax(720px,1fr) 7px var(--ret-stats-w,660px)!important;gap:4px!important;align-items:stretch}
    #hangtraPage .returnPanel{min-width:0}
    #hangtraPage .returnSystemTable{min-width:100%}
    #hangtraPage .retGridResizer{cursor:col-resize;background:#d7dee8;border-left:1px solid #b8c2cf;border-right:1px solid #f8fafc;border-radius:5px;min-height:100%;transition:background .12s}
    #hangtraPage .retGridResizer:hover,#hangtraPage .retGridResizer.active{background:#0b5fa5}
    #hangtraPage .returnStatLine{white-space:nowrap;overflow:visible;text-overflow:clip}
    #hangtraPage .returnStatLine button{margin-left:4px}
"""
          if '#hangtraPage .retGridResizer' not in s:
              marker = '    .retResizeHandle:hover{background:rgba(11,95,165,.25)}\n'
              if marker not in s:
                  raise SystemExit('CSS marker not found')
              s = s.replace(marker, marker + panel_css, 1)

          s = s.replace('@media (max-width:760px){.returnGrid{grid-template-columns:1fr;padding:5px}', '@media (max-width:760px){#hangtraPage .retGridResizer{display:none!important}.returnGrid{grid-template-columns:1fr!important;padding:5px}')

          js_func = r"""
function setupReturnPanelResizers(){
  const grid=document.querySelector('#hangtraPage .returnGrid');
  if(!grid)return;
  const panels=[...grid.children].filter(el=>el&&el.classList&&el.classList.contains('returnPanel'));
  if(panels.length<3)return;
  let left=grid.querySelector('.retGridResizerLeft');
  if(!left){left=document.createElement('div');left.className='retGridResizer retGridResizerLeft';left.title='Kéo để đổi rộng khung GH / SHOP';panels[0].after(left)}
  let right=grid.querySelector('.retGridResizerRight');
  if(!right){right=document.createElement('div');right.className='retGridResizer retGridResizerRight';right.title='Kéo để đổi rộng khung SHOP / Thống kê';panels[1].after(right)}
  if(!grid.dataset.retPanelSizeLoaded){
    grid.dataset.retPanelSizeLoaded='1';
    try{
      const sw=parseInt(localStorage.getItem('KKLG_RET_SYSTEM_W')||'',10);
      const tw=parseInt(localStorage.getItem('KKLG_RET_STATS_W')||'',10);
      if(Number.isFinite(sw))grid.style.setProperty('--ret-system-w',Math.max(420,Math.min(680,sw))+'px');
      if(Number.isFinite(tw))grid.style.setProperty('--ret-stats-w',Math.max(540,Math.min(820,tw))+'px');
    }catch(e){}
  }
  const readPx=(name,fallback)=>{const raw=getComputedStyle(grid).getPropertyValue(name).trim();const n=parseInt(raw,10);return Number.isFinite(n)?n:fallback};
  const savePx=(key,val)=>{try{localStorage.setItem(key,String(val))}catch(e){}};
  const bind=(handle,side)=>{
    if(!handle||handle.dataset.bound)return;
    handle.dataset.bound='1';
    handle.addEventListener('mousedown',ev=>{
      ev.preventDefault();ev.stopPropagation();
      const startX=ev.clientX,startSystem=readPx('--ret-system-w',500),startStats=readPx('--ret-stats-w',660);
      handle.classList.add('active');document.body.style.cursor='col-resize';document.body.style.userSelect='none';
      const onMove=e=>{const dx=e.clientX-startX;if(side==='left'){const next=Math.max(420,Math.min(680,startSystem+dx));grid.style.setProperty('--ret-system-w',next+'px');savePx('KKLG_RET_SYSTEM_W',next)}else{const next=Math.max(540,Math.min(820,startStats-dx));grid.style.setProperty('--ret-stats-w',next+'px');savePx('KKLG_RET_STATS_W',next)}};
      const onUp=()=>{handle.classList.remove('active');document.body.style.cursor='';document.body.style.userSelect='';document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp)};
      document.addEventListener('mousemove',onMove);document.addEventListener('mouseup',onUp);
    });
  };
  bind(left,'left');bind(right,'right');
}
"""
          if 'function setupReturnPanelResizers(){' not in s:
              target = 'function renderReturnTables(){renderReturnSystem();renderReturnShop();renderReturnSummary();enableReturnTableResize()}'
              if target not in s:
                  raise SystemExit('renderReturnTables marker not found')
              s = s.replace(target, js_func + target, 1)
          s = s.replace('function renderReturnTables(){renderReturnSystem();renderReturnShop();renderReturnSummary();enableReturnTableResize()}', 'function renderReturnTables(){setupReturnPanelResizers();renderReturnSystem();renderReturnShop();renderReturnSummary();enableReturnTableResize()}')
          s = s.replace("const preset=table.classList.contains('returnSystemTable')?[50,195,135,76]:[54,210,145,200,90,80];", "const preset=table.classList.contains('returnSystemTable')?[46,188,128,72]:[50,205,140,210,86,72];")

          missing=[x for x in ['retGridResizer','setupReturnPanelResizers','var(--ret-system-w,500px) 7px minmax(720px,1fr) 7px var(--ret-stats-w,660px)'] if x not in s]
          if missing:
              raise SystemExit('Missing markers: '+', '.join(missing))
          if s==orig:
              print('No changes; already patched')
          else:
              p.write_text(s,encoding='utf-8')
              print('Patched index.html')
          PY
      - name: Commit and push
        shell: bash
        run: |
          if git diff --quiet -- index.html; then
            echo "No index.html changes"
            exit 0
          fi
          git config user.name "codex-bot"
          git config user.email "codex-bot@users.noreply.github.com"
          git add index.html
          git commit -m "fix hang tra resizable layout"
          git push
