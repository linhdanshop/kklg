name: Codex fix hang tra balanced layout

on:
  push:
    paths:
      - .github/workflows/codex-fix-hangtra-balanced-layout-20260707.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Patch balanced layout and resizable columns
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          original = text

          balanced = 'grid-template-columns:minmax(540px,.9fr) minmax(760px,1.35fr) minmax(500px,.95fr)'
          text = re.sub(r'grid-template-columns:(?:470px minmax\(820px,1fr\) 480px|minmax\(430px,\.78fr\) minmax\(720px,1\.55fr\) minmax\(360px,\.75fr\)|1\.02fr 1\.22fr \.95fr)', balanced, text)

          # Remove forced fixed panel/table/col widths. They created dead whitespace and blocked manual column resize.
          remove_snippets = [
              '#hangtraPage .returnPanel:first-child{width:470px!important;max-width:470px!important}\n    ',
              '#hangtraPage .returnSystemTable{min-width:464px!important}\n    ',
              '#hangtraPage .returnSystemTable col:nth-child(1){width:54px!important}\n    ',
              '#hangtraPage .returnSystemTable col:nth-child(2){width:185px!important}\n    ',
              '#hangtraPage .returnSystemTable col:nth-child(3){width:145px!important}\n    ',
              '#hangtraPage .returnSystemTable col:nth-child(4){width:80px!important}\n    ',
              '#hangtraPage .returnShopTable col:nth-child(4),#hangtraPage .returnOtherTable col:nth-child(4){width:190px!important}\n',
          ]
          for s in remove_snippets:
              text = text.replace(s, '')

          marker = '#hangtraPage .returnOtherTableBox{max-height:160px;overflow:auto}'
          layout_fix = marker + '\n    #hangtraPage .returnGrid{' + balanced + '!important;align-items:stretch}\n    #hangtraPage .returnPanel{min-width:0}\n    #hangtraPage .returnSystemTable{min-width:100%}\n'
          if marker in text:
              text = text.replace(marker, layout_fix, 1)

          text = text.replace("const preset=table.classList.contains('returnSystemTable')?[54,185,145,80]:[54,190,150,170,90,80];",
                              "const preset=table.classList.contains('returnSystemTable')?[50,195,135,76]:[54,210,145,200,90,80];")

          required = [balanced, '#hangtraPage .returnPanel{min-width:0}', "returnSystemTable')?[50,195,135,76]"]
          missing = [s for s in required if s not in text]
          blocked = ['returnPanel:first-child{width:470px!important', 'returnSystemTable col:nth-child(2){width:185px!important']
          leftovers = [s for s in blocked if s in text]
          if missing or leftovers:
              raise SystemExit('Patch failed. missing=' + ','.join(missing) + ' leftovers=' + ','.join(leftovers))

          if text == original:
              print('No index.html changes needed')
          else:
              path.write_text(text, encoding='utf-8')
              print('Patched balanced Hang tra layout')
          PY
      - name: Commit patch
        run: |
          git config user.name "codex-bot"
          git config user.email "codex-bot@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "balance hang tra panels and restore column resize"
            git push
          fi
