name: Inject Kiếm Đồ C3 time patch

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/inject-find-c3-time-patch.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Inject patch script
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path("index.html")
          s = p.read_text(encoding="utf-8")
          tag = '<script src="find-c3-time-patch.js?v=20260711b"></script>'
          if tag not in s:
              s = s.replace("</body>", tag + "\n</body>", 1)
              p.write_text(s, encoding="utf-8")
          PY
      - name: Validate JavaScript
        run: |
          node --check find-c3-time-patch.js
          python3 - <<'PY'
          from pathlib import Path
          s = Path("index.html").read_text(encoding="utf-8")
          assert 'find-c3-time-patch.js?v=20260711b' in s
          PY
      - name: Commit index loader
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --check
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Load Kiem Do C3 time patch"
          git push
