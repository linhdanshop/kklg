name: Inject Kiếm Đồ C2 C3 patch

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/inject-find-patch.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Inject patch script
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path("index.html")
          s = p.read_text(encoding="utf-8")
          tag = '<script src="find-c2c3-patch.js?v=20260711"></script>'
          if tag not in s:
              s = s.replace("</body>", tag + "\n</body>", 1)
              p.write_text(s, encoding="utf-8")
          PY
      - name: Validate JavaScript
        run: |
          node --check find-c2c3-patch.js
          python3 - <<'PY'
          from pathlib import Path
          import re
          s = Path("index.html").read_text(encoding="utf-8")
          blocks = re.findall(r'<script(?![^>]*\bsrc=)[^>]*>(.*?)</script>', s, re.S)
          Path("/tmp/index-inline.js").write_text("\n".join(blocks), encoding="utf-8")
          assert 'find-c2c3-patch.js?v=20260711' in s
          PY
          node --check /tmp/index-inline.js
      - name: Commit index loader
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --check
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Load Kiem Do C2 C3 patch"
          git push
