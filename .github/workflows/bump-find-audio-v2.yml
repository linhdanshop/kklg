name: Bump Kiem Do audio v2

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/bump-find-audio-v2.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate and bump audio patch
        run: |
          node --check find-audio-patch.js
          python3 - <<'PY'
          from pathlib import Path
          p=Path('index.html')
          s=p.read_text(encoding='utf-8')
          old='find-audio-patch.js?v=20260711a'
          new='find-audio-patch.js?v=20260711b'
          if old in s:
              s=s.replace(old,new,1)
          elif new not in s:
              raise SystemExit('Kiem Do audio loader not found')
          p.write_text(s,encoding='utf-8')
          PY
          git diff --check
      - name: Commit cache bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Bump Kiem Do audio patch version"
          git push
