name: Inject scan and return request patch

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/inject-scan-return-request-patch.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate and inject patch
        run: |
          node --check scan-return-request-patch.js
          python3 - <<'PY'
          from pathlib import Path
          p=Path('index.html')
          s=p.read_text(encoding='utf-8')
          tag='<script src="scan-return-request-patch.js?v=20260711a"></script>'
          if tag not in s:
              s=s.replace('</body>',tag+'\n</body>',1)
              p.write_text(s,encoding='utf-8')
          assert tag in p.read_text(encoding='utf-8')
          PY
          git diff --check
      - name: Commit loader
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Load scan and return request patch"
          git push
