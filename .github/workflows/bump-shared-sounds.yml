name: Bump shared scan sounds

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/bump-shared-sounds.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate shared sound patches and bump cache
        run: |
          node --check find-audio-patch.js
          node --check scan-return-request-patch.js
          python3 - <<'PY'
          from pathlib import Path
          p=Path('index.html')
          s=p.read_text(encoding='utf-8')
          replacements={
              'find-audio-patch.js?v=20260711f':'find-audio-patch.js?v=20260711g',
              'scan-return-request-patch.js?v=20260711b':'scan-return-request-patch.js?v=20260711c',
          }
          for old,new in replacements.items():
              if old in s:
                  s=s.replace(old,new,1)
              elif new not in s:
                  raise SystemExit(f'loader not found: {old}')
          p.write_text(s,encoding='utf-8')
          PY
          git diff --check
      - name: Commit cache bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Bump shared scan sound versions"
          git push
